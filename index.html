<!DOCTYPE html>
<html>
<head>
  <title>CodeLoadX</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
    }

    #container {
      display: flex;
      height: 90vh;
    }

    textarea {
      width: 50%;
      background: #222;
      color: white;
      font-size: 16px;
      padding: 10px;
      border: none;
      outline: none;
      resize: none;
    }

    iframe {
      width: 50%;
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<h1>CodeLoadX</h1>

<div id="container">
  <textarea id="code"><h1>Hello CodeLoadX</h1>
<style>
h1 { color: blue; }
</style>

<script>
console.log("CodeLoadX running");
</script>
  </textarea>

  <iframe id="preview"></iframe>
</div>

<script>
const code = document.getElementById("code");
const preview = document.getElementById("preview");

function update() {
  preview.srcdoc = code.value;
}

code.addEventListener("input", update);
update();
</script>

</body>
</html>
