<!DOCTYPE html>
<html>
<head>
  <title>CodeLoadX</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    h1 {
      text-align: center;
      margin: 10px 0;
    }

    #topbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
    }

    button {
      background: #4c8cff;
      border: none;
      padding: 10px 20px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #container {
      display: flex;
      height: 90vh;
    }

    textarea {
      width: 50%;
      background: #222;
      color: white;
      font-size: 16px;
      padding: 10px;
      border: none;
      outline: none;
      resize: none;
    }

    iframe {
      width: 50%;
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<h1>CodeLoadX</h1>

<div id="topbar">
  <button onclick="update()">Run</button>
  <button onclick="publish()">Publish</button>
</div>

<div id="container">
  <textarea id="code"><h1>Hello CodeLoadX</h1>

<style>
h1 { color: blue; }
</style>

<script>
console.log("CodeLoadX running");
</script>
  </textarea>

  <iframe id="preview"></iframe>
</div>

<script>
const code = document.getElementById("code");
const preview = document.getElementById("preview");

function update() {
  preview.srcdoc = code.value;
}

code.addEventListener("input", update);
update();

// 🔥 PUBLISH FUNCTION
function publish() {
  const blob = new Blob([code.value], { type: "text/html" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "index.html";

  a.click();

  alert("Download complete. Upload index.html to GitHub Pages to publish your site.");
}
</script>

</body>
</html>
